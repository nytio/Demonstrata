#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "on-request"
sandbox_mode = "workspace-write"
model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
default_permissions = "local_loopback"

project_doc_fallback_filenames = ["AGENTS.md"]

[features]
multi_agent = false

[shell_environment_policy.set]
LEANSEARCHCLIENT_LOOGLE_API_URL = "http://127.0.0.1:8088/json"

[permissions.local_loopback.filesystem]
glob_scan_max_depth = 3
":project_roots" = { "." = "write", "**/.env" = "none", "**/*.env" = "none", "**/.env.*" = "none", "**/secrets.*" = "none" }

[permissions.local_loopback.network]
enabled = true
mode = "limited"
allow_local_binding = true

[permissions.local_loopback.network.domains]
"localhost" = "allow"
"127.0.0.1" = "allow"
